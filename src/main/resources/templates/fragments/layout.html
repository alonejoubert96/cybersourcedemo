<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title}">CyberShop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        :root {
            --cs-primary: #1a1f71;
            --cs-accent: #f7b731;
            --cs-light: #f4f6fc;
        }
        body { background-color: var(--cs-light); font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
        .navbar-store { background: var(--cs-primary); }
        .navbar-store .navbar-brand { font-weight: 700; letter-spacing: -0.5px; }
        .navbar-store .nav-link { color: rgba(255,255,255,.85); }
        .navbar-store .nav-link:hover { color: #fff; }
        .cart-badge {
            position: absolute; top: -4px; right: -8px;
            background: var(--cs-accent); color: var(--cs-primary);
            font-size: 0.65rem; font-weight: 700;
            width: 18px; height: 18px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }
        .btn-accent { background: var(--cs-accent); color: var(--cs-primary); font-weight: 600; border: none; }
        .btn-accent:hover { background: #e5a829; color: var(--cs-primary); }
        .product-card { border: none; border-radius: 12px; overflow: hidden; transition: transform .2s, box-shadow .2s; }
        .product-card:hover { transform: translateY(-4px); box-shadow: 0 8px 25px rgba(0,0,0,.1); }
        .product-img {
            height: 180px; display: flex; align-items: center; justify-content: center;
            font-size: 3.5rem; color: #fff;
        }
        .toast-container { position: fixed; top: 80px; right: 20px; z-index: 1080; }
        .order-summary { position: sticky; top: 20px; }
        .payment-option { cursor: pointer; border: 2px solid #dee2e6; border-radius: 10px; padding: 12px 16px; transition: all .2s; }
        .payment-option:hover { border-color: #adb5bd; }
        .payment-option.active { border-color: var(--cs-primary); background: rgba(26,31,113,.03); }
        .payment-option .bi { font-size: 1.25rem; }
        .checkout-form { display: none; }
        .checkout-form.active { display: block; }
        .qty-btn { width: 32px; height: 32px; padding: 0; display: flex; align-items: center; justify-content: center; }
        .confirmation-icon { font-size: 4rem; color: #198754; }
        .result-box { display: none; }

        /* Card brand badges */
        .card-brand-badge {
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 0.7rem; font-weight: 700; letter-spacing: .5px;
            padding: 2px 8px; border-radius: 4px; color: #fff; vertical-align: middle;
        }
        .card-brand-badge.visa { background: #1a1f71; }
        .card-brand-badge.mastercard { background: linear-gradient(135deg, #eb001b, #f79e1b); }
        .card-brand-badge.amex { background: #2e77bc; }
        .card-brand-badge.discover { background: #ff6600; }
        .card-brand-badge.unknown { background: #6c757d; }

        /* Wallet tile buttons */
        .wallet-tiles { display: flex; gap: 12px; flex-wrap: wrap; }
        .wallet-tile {
            flex: 1; min-width: 100px; padding: 16px 12px; border-radius: 10px;
            border: 2px solid #dee2e6; background: #fff; cursor: pointer;
            text-align: center; font-weight: 600; font-size: .85rem;
            transition: all .2s; display: flex; flex-direction: column;
            align-items: center; gap: 8px;
        }
        .wallet-tile:hover { border-color: #adb5bd; transform: translateY(-2px); }
        .wallet-tile.selected { border-width: 3px; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(0,0,0,.1); }
        .wallet-tile.google-pay.selected { border-color: #4285F4; background: #f0f4ff; }
        .wallet-tile.apple-pay.selected { border-color: #333; background: #f5f5f5; }
        .wallet-tile.samsung-pay.selected { border-color: #1428a0; background: #eef0ff; }
        .wallet-tile .wallet-icon { font-size: 1.5rem; }
        .wallet-tile.google-pay .wallet-icon { color: #4285F4; }
        .wallet-tile.apple-pay .wallet-icon { color: #333; }
        .wallet-tile.samsung-pay .wallet-icon { color: #1428a0; }

        /* Small card scheme icons on cart buttons */
        .scheme-icons { display: inline-flex; gap: 4px; margin-left: 8px; }
        .scheme-icons .mini-badge {
            font-size: 0.55rem; font-weight: 700; padding: 1px 5px;
            border-radius: 3px; color: #fff; letter-spacing: .3px;
        }
        .scheme-icons .mini-visa { background: #1a1f71; }
        .scheme-icons .mini-mc { background: linear-gradient(135deg, #eb001b, #f79e1b); }
        .scheme-icons .mini-amex { background: #2e77bc; }
        .scheme-icons .mini-gpay { background: #4285F4; }
        .scheme-icons .mini-apay { background: #333; }
        .scheme-icons .mini-spay { background: #1428a0; }

        /* Wallet auth button */
        .wallet-auth-btn { margin-top: 16px; font-weight: 600; font-size: 1rem; }
        .wallet-auth-btn.google-pay { border-color: #4285F4; color: #4285F4; }
        .wallet-auth-btn.google-pay:hover { background: #4285F4; color: #fff; }
        .wallet-auth-btn.apple-pay { border-color: #333; color: #333; }
        .wallet-auth-btn.apple-pay:hover { background: #333; color: #fff; }
        .wallet-auth-btn.samsung-pay { border-color: #1428a0; color: #1428a0; }
        .wallet-auth-btn.samsung-pay:hover { background: #1428a0; color: #fff; }

        /* Wallet authentication modal overlay */
        .wallet-modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,.5);
            display: flex; align-items: center; justify-content: center;
            z-index: 2000; opacity: 0; transition: opacity .2s;
        }
        .wallet-modal-overlay.show { opacity: 1; }
        .wallet-modal {
            background: #fff; border-radius: 16px; width: 360px;
            max-width: 90vw; overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,.3);
            transform: translateY(20px); transition: transform .2s;
        }
        .wallet-modal-overlay.show .wallet-modal { transform: translateY(0); }
        .wallet-modal-header {
            padding: 20px 24px; color: #fff;
            display: flex; align-items: center; gap: 12px;
        }
        .wallet-modal-body { padding: 24px; }
        .wallet-modal-footer {
            padding: 12px 24px; text-align: center;
            border-top: 1px solid #eee;
        }

        /* Saved card selection */
        .saved-card-option {
            border: 2px solid #dee2e6; border-radius: 10px; padding: 14px 16px;
            margin-bottom: 10px; cursor: pointer; transition: all .2s;
        }
        .saved-card-option:hover { border-color: #adb5bd; background: #fafafa; }
        .saved-card-option.selected { border-color: var(--cs-primary); background: rgba(26,31,113,.03); }
        .saved-card-radio {
            width: 20px; height: 20px; border-radius: 50%;
            border: 2px solid #adb5bd; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
        }
        .saved-card-option.selected .saved-card-radio { border-color: var(--cs-primary); }
        .saved-card-radio-dot {
            width: 10px; height: 10px; border-radius: 50%;
            background: var(--cs-primary);
        }

        /* Cart: Delivery option buttons */
        .delivery-opt {
            border: 2px solid #dee2e6; border-radius: 8px; padding: 10px 24px;
            font-weight: 600; color: #333; background: #fff; transition: all .2s;
        }
        .delivery-opt.active { border-color: var(--cs-primary); color: var(--cs-primary); }
        .delivery-opt:disabled { opacity: .4; cursor: not-allowed; }

        /* Cart: Payment method buttons */
        .pay-method-btn {
            border: 1px solid #333; border-radius: 6px; padding: 12px;
            font-weight: 500; font-size: 1rem; background: #fff; color: #333;
            display: flex; align-items: center; justify-content: center;
            transition: all .15s;
        }
        .pay-method-btn:hover { background: #f8f8f8; }
        .pay-method-btn:first-child { border-width: 2px; }

        /* Wizard: Cards */
        .wiz-card {
            border: 1px solid #e0e0e0; border-radius: 8px; padding: 24px;
            margin-bottom: 16px; background: #fff;
        }
        .wiz-card.wiz-summary { background: #fafafa; }
        .wiz-label {
            font-size: 0.7rem; font-weight: 700; letter-spacing: 1.5px;
            text-transform: uppercase; color: #333; margin-bottom: 16px;
        }
        .wiz-field-label { font-size: 0.8rem; color: #666; margin-bottom: 4px; display: block; }
        .wiz-input { border: 1px solid #ccc; border-radius: 4px; }
        .wiz-input:focus { border-color: var(--cs-primary); box-shadow: 0 0 0 2px rgba(26,31,113,.1); }
        .wiz-edit { color: var(--cs-primary); cursor: pointer; font-size: 0.9rem; text-decoration: none; }
        .wiz-edit:hover { text-decoration: underline; }
        .wiz-btn {
            border: 1px solid #333; background: #fff; color: #333;
            padding: 14px 48px; font-size: 1rem; font-weight: 500;
            border-radius: 6px; cursor: pointer; display: inline-flex;
            align-items: center; justify-content: center; gap: 8px;
            transition: all .15s;
        }
        .wiz-btn:hover { background: #f5f5f5; }
        .wiz-btn:disabled { opacity: .6; cursor: not-allowed; }
    </style>
</head>
<body>
<nav th:fragment="navbar" class="navbar navbar-dark navbar-store py-2 mb-0">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2" href="/">
            <i class="bi bi-lightning-charge-fill" style="color: var(--cs-accent);"></i>
            CyberShop
        </a>
        <div class="d-flex align-items-center gap-3">
            <a href="/" class="nav-link">Products</a>
            <a href="/cart" class="nav-link position-relative">
                <i class="bi bi-bag fs-5"></i>
                <span id="cartBadge" class="cart-badge" style="display:none;">0</span>
            </a>
        </div>
    </div>
</nav>
</body>
</html>
