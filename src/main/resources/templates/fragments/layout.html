<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title}">CyberSource Demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card-hover:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(0,0,0,.15); transition: all .2s; }
        .card-hover { transition: all .2s; cursor: pointer; }
        .disabled-card { opacity: 0.5; pointer-events: none; }
        .step-badge { font-size: 0.75rem; }
        .flow-arrow { text-align: center; color: #6c757d; font-size: 1.5rem; padding: 0.25rem 0; }
        .result-box { display: none; }
    </style>
</head>
<body>
<nav th:fragment="navbar" class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">CyberSource Payment Demo</a>
        <span class="navbar-text text-muted small">Sandbox: testrest @ apitest.cybersource.com</span>
    </div>
</nav>
</body>
</html>
