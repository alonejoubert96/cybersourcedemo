<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title}">CyberShop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        :root {
            --cs-primary: #1a1f71;
            --cs-accent: #f7b731;
            --cs-light: #f4f6fc;
        }
        body { background-color: var(--cs-light); font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
        .navbar-store { background: var(--cs-primary); }
        .navbar-store .navbar-brand { font-weight: 700; letter-spacing: -0.5px; }
        .navbar-store .nav-link { color: rgba(255,255,255,.85); }
        .navbar-store .nav-link:hover { color: #fff; }
        .cart-badge {
            position: absolute; top: -4px; right: -8px;
            background: var(--cs-accent); color: var(--cs-primary);
            font-size: 0.65rem; font-weight: 700;
            width: 18px; height: 18px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }
        .btn-accent { background: var(--cs-accent); color: var(--cs-primary); font-weight: 600; border: none; }
        .btn-accent:hover { background: #e5a829; color: var(--cs-primary); }
        .product-card { border: none; border-radius: 12px; overflow: hidden; transition: transform .2s, box-shadow .2s; }
        .product-card:hover { transform: translateY(-4px); box-shadow: 0 8px 25px rgba(0,0,0,.1); }
        .product-img {
            height: 180px; display: flex; align-items: center; justify-content: center;
            font-size: 3.5rem; color: #fff;
        }
        .toast-container { position: fixed; top: 80px; right: 20px; z-index: 1080; }
        .order-summary { position: sticky; top: 20px; }
        .payment-option { cursor: pointer; border: 2px solid #dee2e6; border-radius: 10px; padding: 12px 16px; transition: all .2s; }
        .payment-option:hover { border-color: #adb5bd; }
        .payment-option.active { border-color: var(--cs-primary); background: rgba(26,31,113,.03); }
        .payment-option .bi { font-size: 1.25rem; }
        .checkout-form { display: none; }
        .checkout-form.active { display: block; }
        .qty-btn { width: 32px; height: 32px; padding: 0; display: flex; align-items: center; justify-content: center; }
        .confirmation-icon { font-size: 4rem; color: #198754; }
        .result-box { display: none; }

        /* Cart: Delivery option buttons */
        .delivery-opt {
            border: 2px solid #dee2e6; border-radius: 8px; padding: 10px 24px;
            font-weight: 600; color: #333; background: #fff; transition: all .2s;
        }
        .delivery-opt.active { border-color: var(--cs-primary); color: var(--cs-primary); }
        .delivery-opt:disabled { opacity: .4; cursor: not-allowed; }

        /* Cart: Payment method buttons */
        .pay-method-btn {
            border: 1px solid #333; border-radius: 6px; padding: 12px;
            font-weight: 500; font-size: 1rem; background: #fff; color: #333;
            display: flex; align-items: center; justify-content: center;
            transition: all .15s;
        }
        .pay-method-btn:hover { background: #f8f8f8; }
        .pay-method-btn:first-child { border-width: 2px; }

        /* Wizard: Cards */
        .wiz-card {
            border: 1px solid #e0e0e0; border-radius: 8px; padding: 24px;
            margin-bottom: 16px; background: #fff;
        }
        .wiz-card.wiz-summary { background: #fafafa; }
        .wiz-label {
            font-size: 0.7rem; font-weight: 700; letter-spacing: 1.5px;
            text-transform: uppercase; color: #333; margin-bottom: 16px;
        }
        .wiz-field-label { font-size: 0.8rem; color: #666; margin-bottom: 4px; display: block; }
        .wiz-input { border: 1px solid #ccc; border-radius: 4px; }
        .wiz-input:focus { border-color: var(--cs-primary); box-shadow: 0 0 0 2px rgba(26,31,113,.1); }
        .wiz-edit { color: var(--cs-primary); cursor: pointer; font-size: 0.9rem; text-decoration: none; }
        .wiz-edit:hover { text-decoration: underline; }
        .wiz-btn {
            border: 1px solid #333; background: #fff; color: #333;
            padding: 14px 48px; font-size: 1rem; font-weight: 500;
            border-radius: 6px; cursor: pointer; display: inline-flex;
            align-items: center; justify-content: center; gap: 8px;
            transition: all .15s;
        }
        .wiz-btn:hover { background: #f5f5f5; }
        .wiz-btn:disabled { opacity: .6; cursor: not-allowed; }

        /* Payment method list */
        .payment-method-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .payment-method-item {
            display: flex;
            align-items: center;
            gap: 14px;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            padding: 14px 16px;
            cursor: pointer;
            transition: all .15s;
            background: #fff;
        }
        .payment-method-item:hover {
            border-color: var(--cs-primary);
            background: rgba(26, 31, 113, .03);
        }
        .payment-method-item .method-icon {
            font-size: 1.4rem;
            color: var(--cs-primary);
            width: 32px;
            text-align: center;
            flex-shrink: 0;
        }
        .payment-method-item .method-label {
            font-size: 0.95rem;
            font-weight: 600;
            color: #333;
        }
        .payment-method-item .method-chevron {
            margin-left: auto;
            color: #adb5bd;
            font-size: 1rem;
        }

        /* Payment sidebar */
        #paymentSidebar { width: 480px; max-width: 90vw; }
        #paymentSidebar .offcanvas-header {
            background: var(--cs-primary);
            color: #fff;
        }
        #paymentSidebar .offcanvas-header .btn-close {
            filter: brightness(0) invert(1);
        }
        #paymentSidebar .offcanvas-body { padding: 24px; }

        @media (max-width: 480px) {
            #paymentSidebar { width: 100vw; }
        }
    </style>
</head>
<body>
<nav th:fragment="navbar" class="navbar navbar-dark navbar-store py-2 mb-0">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2" href="/">
            <i class="bi bi-lightning-charge-fill" style="color: var(--cs-accent);"></i>
            CyberShop
        </a>
        <div class="d-flex align-items-center gap-3">
            <a href="/" class="nav-link">Products</a>
            <a href="/cart" class="nav-link position-relative">
                <i class="bi bi-bag fs-5"></i>
                <span id="cartBadge" class="cart-badge" style="display:none;">0</span>
            </a>
        </div>
    </div>
</nav>
</body>
</html>
