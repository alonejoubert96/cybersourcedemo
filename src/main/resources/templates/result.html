<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Payment Result')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container" style="max-width: 600px;">

    <!-- Success -->
    <div th:if="${success}" class="alert alert-success">
        <h4 th:text="${status}">SUCCESS</h4>
        <p th:text="${message}"></p>
        <p th:if="${transactionId}">
            <strong>Transaction ID:</strong>
            <code th:text="${transactionId}"></code>
        </p>
        <p th:if="${httpStatus}">
            <strong>HTTP Status:</strong>
            <span th:text="${httpStatus}"></span>
        </p>
        <div th:if="${details != null && !details.isEmpty()}">
            <strong>Details:</strong>
            <ul class="list-unstyled mt-1">
                <li th:each="entry : ${details}">
                    <code th:text="${entry.key}"></code>:
                    <span th:text="${entry.value}"></span>
                </li>
            </ul>
        </div>
    </div>

    <!-- Error -->
    <div th:unless="${success}" class="alert alert-danger">
        <h4>Payment Failed</h4>
        <p th:text="${message}"></p>
        <div th:if="${errorBody}" class="mt-2">
            <strong>Error Response:</strong>
            <pre class="mt-1 p-2 bg-light border rounded" style="white-space: pre-wrap;"
                 th:text="${errorBody}"></pre>
        </div>
    </div>

    <div class="d-flex gap-2">
        <a th:href="@{'/checkout/' + ${backTo}}" class="btn btn-primary">Try Again</a>
        <a href="/" class="btn btn-outline-secondary">Back to Home</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
