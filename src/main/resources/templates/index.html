<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('CyberShop — Secure Payment Demo')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<!-- Hero -->
<div class="bg-white border-bottom py-4 mb-4">
    <div class="container">
        <div class="row align-items-center">
            <div class="col-lg-7">
                <h1 class="fw-bold mb-2" style="color: var(--cs-primary);">Welcome to CyberShop</h1>
                <p class="text-muted mb-0 fs-5">Browse products, add them to your cart and check out using any of the supported payment methods.</p>
            </div>
            <div class="col-lg-5 text-end d-none d-lg-block">
                <span class="badge bg-light text-dark border px-3 py-2">
                    <i class="bi bi-shield-lock me-1"></i> Sandbox Mode &mdash; No real charges
                </span>
            </div>
        </div>
    </div>
</div>

<!-- Products -->
<div class="container mb-5">
    <div class="row g-4" id="productGrid"></div>
</div>

<!-- Toast for "Added to cart" -->
<div class="toast-container" id="toastContainer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/store.js"></script>
<script>
    renderProductGrid();
</script>
</body>
</html>
