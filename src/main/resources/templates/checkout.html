<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Checkout — CyberShop')}"></head>
<head>
    <style>
        /* Confirmation modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1060;
            left: 0; top: 0;
            width: 100%; height: 100%;
            overflow: auto;
            background-color: rgba(0,0,0,0.4);
        }
        .modal-content {
            background-color: #fefefe;
            margin: 15% auto;
            padding: 20px;
            border: 1px solid #888;
            width: 80%; max-width: 500px;
            border-radius: 5px;
            font-family: Arial, sans-serif;
        }
        .close {
            color: #aaa; float: right;
            font-size: 28px; font-weight: bold; cursor: pointer;
        }
        .close:hover, .close:focus { color: black; text-decoration: none; }
        .payment-success { color: #28a745; font-size: 24px; margin-bottom: 20px; text-align: center; }
        .payment-details { margin-bottom: 20px; }
        .payment-details h3 { margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .payment-details p { margin: 5px 0; }
    </style>
    <!-- Unified Checkout Library -->
    <script th:src="${clientLibrary}"
            th:integrity="${clientLibraryIntegrity}"
            crossorigin="anonymous"></script>
</head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<!-- Checkout Page -->
<div id="checkoutPage" class="container my-4" style="max-width: 680px;">
    <div class="d-flex align-items-center mb-4">
        <a class="text-dark fs-4" style="cursor:pointer;" onclick="wizardBack()">
            <i class="bi bi-arrow-left"></i>
        </a>
        <h2 class="flex-grow-1 text-center mb-0" style="letter-spacing: 3px; font-weight: 700; color: var(--cs-primary);">CHECKOUT</h2>
        <div style="width: 24px;"></div>
    </div>

    <!-- Order Summary (rendered by store.js) -->
    <div id="wizardContent"></div>

    <!-- Payment Methods -->
    <div class="wiz-card">
        <div class="wiz-label">CHOOSE PAYMENT METHOD</div>
        <div class="payment-method-list">
            <div class="payment-method-item" onclick="openCardSidebar()">
                <div class="method-icon"><i class="bi bi-credit-card"></i></div>
                <div class="method-label">Card</div>
                <div class="method-chevron"><i class="bi bi-chevron-right"></i></div>
            </div>
            <div class="payment-method-item" onclick="openWalletSidebar()">
                <div class="method-icon"><i class="bi bi-wallet2"></i></div>
                <div class="method-label">Digital Wallet</div>
                <div class="method-chevron"><i class="bi bi-chevron-right"></i></div>
            </div>
            <div class="payment-method-item" onclick="openCustomSidebar('token')">
                <div class="method-icon"><i class="bi bi-shield-check"></i></div>
                <div class="method-label">Saved Card</div>
                <div class="method-chevron"><i class="bi bi-chevron-right"></i></div>
            </div>
            <div class="payment-method-item" onclick="openCustomSidebar('invoice')">
                <div class="method-icon"><i class="bi bi-receipt"></i></div>
                <div class="method-label">Pay by Invoice</div>
                <div class="method-chevron"><i class="bi bi-chevron-right"></i></div>
            </div>
            <div class="payment-method-item" onclick="openCustomSidebar('paymentLink')">
                <div class="method-icon"><i class="bi bi-link-45deg"></i></div>
                <div class="method-label">Payment Link</div>
                <div class="method-chevron"><i class="bi bi-chevron-right"></i></div>
            </div>
        </div>
    </div>

    <!-- Hidden inputs for UC -->
    <input type="hidden" id="transientToken" name="transientToken" />
    <input type="hidden" id="jwt" th:value="${jwt}" />
</div>

<!-- Payment Sidebar (Bootstrap Offcanvas) -->
<div class="offcanvas offcanvas-end" tabindex="-1" id="paymentSidebar"
     data-bs-backdrop="true" data-bs-scroll="false">
    <div class="offcanvas-header">
        <h5 class="offcanvas-title" id="paymentSidebarLabel">Payment</h5>
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
    </div>
    <div class="offcanvas-body">
        <div id="sidebarContent"></div>
    </div>
</div>

<!-- Payment Confirmation Modal -->
<div id="paymentModal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <div class="payment-success">
            <h2>Payment Successful!</h2>
        </div>
        <div class="payment-details">
            <h3>Payment Details</h3>
            <p><strong>Status:</strong> <span id="paymentStatus"></span></p>
            <p><strong>Message:</strong> <span id="paymentMessage"></span></p>
            <p><strong>Transaction ID:</strong> <span id="transactionId"></span></p>
            <p><strong>Amount:</strong> <span id="paymentAmount"></span></p>
            <p><strong>Currency:</strong> <span id="paymentCurrency"></span></p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/store.js"></script>
<script>initCheckout();</script>
<script>
    var jwt = document.getElementById("jwt").value;
    var ucInitialized = false;
    var ucSidebarPending = false;

    // Parse JWT payload
    function parseJwt(token) {
        try {
            var base64Url = token.split('.')[1];
            var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            var jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
            return JSON.parse(jsonPayload);
        } catch (e) {
            console.error("Error parsing JWT:", e);
            return null;
        }
    }

    // Show payment confirmation modal
    function showPaymentModal(paymentDetails) {
        var modal = document.getElementById("paymentModal");

        document.getElementById("paymentStatus").textContent = paymentDetails.status || paymentDetails.outcome || "COMPLETED";
        document.getElementById("paymentMessage").textContent = paymentDetails.message || "Transaction processed";

        var transactionId = paymentDetails.details &&
            paymentDetails.details.processorInformation &&
            paymentDetails.details.processorInformation.transactionId ||
            paymentDetails.id || "N/A";
        document.getElementById("transactionId").textContent = transactionId;

        if (paymentDetails.details &&
            paymentDetails.details.orderInformation &&
            paymentDetails.details.orderInformation.amountDetails) {
            var amountDetails = paymentDetails.details.orderInformation.amountDetails;
            document.getElementById("paymentAmount").textContent = amountDetails.totalAmount || amountDetails.authorizedAmount || "N/A";
            document.getElementById("paymentCurrency").textContent = amountDetails.currency || "ZAR";
        } else {
            document.getElementById("paymentAmount").textContent = "N/A";
            document.getElementById("paymentCurrency").textContent = "N/A";
        }

        modal.style.display = "block";

        var span = document.getElementsByClassName("close")[0];
        span.onclick = function() { modal.style.display = "none"; };
        window.onclick = function(event) {
            if (event.target == modal) modal.style.display = "none";
        };
    }

    // Initialize UC widget inside the sidebar
    async function initUcWidget() {
        var sidebarEl = document.getElementById('paymentSidebar');
        var sidebar = bootstrap.Offcanvas.getOrCreateInstance(sidebarEl);

        sidebarEl.addEventListener('shown.bs.offcanvas', async function handler() {
            sidebarEl.removeEventListener('shown.bs.offcanvas', handler);

            if (ucSidebarPending) return;
            ucSidebarPending = true;

            try {
                var accept = await Accept(jwt);
                var up = await accept.unifiedPayments(true);

                var spinner = document.querySelector('#sidebarContent .spinner-border');
                if (spinner) spinner.closest('.text-center').remove();

                ucInitialized = true;

                var tt = await up.show({
                    containers: { paymentSelection: "#ucWidgetContainer" }
                });

                var completeResponse = await up.complete(tt);
                var parsed = parseJwt(completeResponse);
                if (parsed) {
                    sidebar.hide();
                    showPaymentModal(parsed);
                }
            } catch (error) {
                console.error("UC payment error:", error);
                ucSidebarPending = false;
            }
        });

        sidebar.show();
    }

    // Open sidebar for Card payment
    function openCardSidebar() {
        var sidebarEl = document.getElementById('paymentSidebar');
        var sidebar = bootstrap.Offcanvas.getOrCreateInstance(sidebarEl);

        if (ucInitialized) {
            document.getElementById('paymentSidebarLabel').textContent = 'Pay with Card';
            sidebar.show();
            return;
        }

        ucInitialized = false;
        ucSidebarPending = false;

        document.getElementById('paymentSidebarLabel').textContent = 'Pay with Card';
        document.getElementById('sidebarContent').innerHTML =
            '<div class="text-center my-4">'
            + '<div class="spinner-border text-primary" role="status">'
            + '<span class="visually-hidden">Loading...</span></div>'
            + '<p class="text-muted mt-2">Loading payment options...</p></div>'
            + '<div id="ucWidgetContainer" class="mt-3"></div>';

        initUcWidget();
    }

    // Open sidebar for Digital Wallet — shows sub-list first
    function openWalletSidebar() {
        ucInitialized = false;
        ucSidebarPending = false;

        document.getElementById('paymentSidebarLabel').textContent = 'Choose wallet payment option';
        document.getElementById('sidebarContent').innerHTML =
            '<div class="payment-method-list">'
            + '<div class="payment-method-item" onclick="selectWallet(\'Apple Pay\')">'
            + '<div class="method-icon"><i class="bi bi-apple"></i></div>'
            + '<div class="method-label">Apple Pay</div>'
            + '<div class="method-chevron"><i class="bi bi-chevron-right"></i></div></div>'
            + '<div class="payment-method-item" onclick="selectWallet(\'Google Pay\')">'
            + '<div class="method-icon"><i class="bi bi-google"></i></div>'
            + '<div class="method-label">Google Pay</div>'
            + '<div class="method-chevron"><i class="bi bi-chevron-right"></i></div></div>'
            + '<div class="payment-method-item" onclick="selectWallet(\'Click to Pay\')">'
            + '<div class="method-icon"><i class="bi bi-cursor-fill"></i></div>'
            + '<div class="method-label">Click to Pay</div>'
            + '<div class="method-chevron"><i class="bi bi-chevron-right"></i></div></div>'
            + '</div>';

        var sidebar = bootstrap.Offcanvas.getOrCreateInstance(
            document.getElementById('paymentSidebar'));
        sidebar.show();
    }

    // User selected a specific wallet — show UC widget
    function selectWallet(walletName) {
        document.getElementById('paymentSidebarLabel').textContent = 'Pay with ' + walletName;
        document.getElementById('sidebarContent').innerHTML =
            '<div class="text-center my-4">'
            + '<div class="spinner-border text-primary" role="status">'
            + '<span class="visually-hidden">Loading...</span></div>'
            + '<p class="text-muted mt-2">Loading ' + walletName + '...</p></div>'
            + '<div id="ucWidgetContainer" class="mt-3"></div>';

        initUcWidget();
    }

    // Open sidebar with custom payment form
    function openCustomSidebar(method) {
        ucInitialized = false;
        ucSidebarPending = false;

        var titles = {
            token: 'Saved Card',
            invoice: 'Pay by Invoice',
            paymentLink: 'Payment Link'
        };
        var renderers = {
            token: renderTokenForm,
            invoice: renderInvoiceForm,
            paymentLink: renderPaymentLinkForm
        };

        document.getElementById('paymentSidebarLabel').textContent = titles[method];
        document.getElementById('sidebarContent').innerHTML = renderers[method]();

        var sidebar = bootstrap.Offcanvas.getOrCreateInstance(
            document.getElementById('paymentSidebar'));
        sidebar.show();
    }
</script>
</body>
</html>
