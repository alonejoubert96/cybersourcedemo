<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Checkout — CyberShop')}"></head>
<head>
    <!-- Unified Checkout Library -->
    <script th:src="${clientLibrary}"
            th:integrity="${clientLibraryIntegrity}"
            crossorigin="anonymous"></script>
</head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<!-- Checkout Page -->
<div id="checkoutPage" class="container my-4" style="max-width: 680px;">
    <div class="d-flex align-items-center mb-4">
        <a class="text-dark fs-4" style="cursor:pointer;" onclick="wizardBack()">
            <i class="bi bi-arrow-left"></i>
        </a>
        <h2 class="flex-grow-1 text-center mb-0" style="letter-spacing: 3px; font-weight: 700; color: var(--cs-primary);">CHECKOUT</h2>
        <div style="width: 24px;"></div>
    </div>

    <!-- Order Summary (rendered by store.js) -->
    <div id="wizardContent"></div>

    <!-- Unified Checkout -->
    <div class="wiz-card">
        <div class="wiz-label">UNIFIED CHECKOUT</div>
        <div id="ucWidgetContainer"></div>
        <div id="ucConfirmation" style="display:none;"></div>
    </div>

    <!-- Other Payment Options -->
    <div class="wiz-card">
        <div class="wiz-label">OTHER PAYMENT OPTIONS</div>
        <div class="payment-method-list">
            <div class="payment-method-item" onclick="openCustomSidebar('cardOnly')">
                <div class="method-icon"><i class="bi bi-credit-card"></i></div>
                <div class="method-label">Click to Pay</div>
            </div>
            <div class="payment-method-item" onclick="openCustomSidebar('tokenizedCheckout')">
                <div class="method-icon"><i class="bi bi-credit-card-2-front"></i></div>
                <div class="method-label">Tokenized Card</div>
            </div>
            <div class="payment-method-item" onclick="openCustomSidebar('paymentLink')">
                <div class="method-icon"><i class="bi bi-link-45deg"></i></div>
                <div class="method-label">Payment Link</div>
            </div>
            <div class="payment-method-item" onclick="openCustomSidebar('invoice')">
                <div class="method-icon"><i class="bi bi-receipt"></i></div>
                <div class="method-label">Pay by Invoice</div>
            </div>
            <div class="payment-method-item" onclick="openCustomSidebar('samsungPay')">
                <div class="method-icon"><i class="bi bi-phone"></i></div>
                <div class="method-label">Samsung Pay</div>
            </div>
            <div class="payment-method-item" onclick="openCustomSidebar('token')">
                <div class="method-icon"><i class="bi bi-shield-lock"></i></div>
                <div class="method-label">Saved Card</div>
            </div>
        </div>
    </div>

    <!-- Hidden inputs for UC -->
    <input type="hidden" id="transientToken" name="transientToken" />
    <input type="hidden" id="jwt" th:value="${jwt}" />
</div>

<!-- 3DS Device Data Collection (hidden) -->
<iframe id="cardinal_collection_iframe" name="collectionIframe" height="10" width="10" style="display:none;"></iframe>
<form id="cardinal_collection_form" method="POST" target="collectionIframe" action="">
    <input id="cardinal_collection_form_input" type="hidden" name="JWT" value="">
</form>

<!-- 3DS Challenge Modal -->
<div class="modal fade" id="threeDsModal" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered" style="max-width:520px;">
        <div class="modal-content" style="border-radius:12px;overflow:hidden;">
            <div class="modal-header" style="background:#1a1f71;color:#fff;border:none;">
                <h6 class="modal-title"><i class="bi bi-shield-lock me-2"></i>Bank Verification Required</h6>
            </div>
            <div class="modal-body p-0" style="min-height:420px;">
                <iframe id="step-up-iframe" name="step-up-iframe" style="width:100%;height:420px;border:none;"></iframe>
                <form id="step-up-form" target="step-up-iframe" method="POST" action="">
                    <input type="hidden" name="JWT" id="step-up-jwt" value="">
                    <input type="hidden" name="MD" id="step-up-md" value="">
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Payment Sidebar (Bootstrap Offcanvas) -->
<div class="offcanvas offcanvas-end" tabindex="-1" id="paymentSidebar"
     data-bs-backdrop="true" data-bs-scroll="false">
    <div class="offcanvas-header">
        <h5 class="offcanvas-title" id="paymentSidebarLabel">Payment</h5>
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
    </div>
    <div class="offcanvas-body">
        <div id="sidebarContent"></div>
    </div>
</div>

<!-- Payment Confirmation Modal (no longer used — confirmation rendered in sidebar) -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/store.js"></script>
<script>initCheckout();</script>
<script>
    var jwt = document.getElementById("jwt").value;

    // Parse JWT payload
    function parseJwt(token) {
        try {
            var base64Url = token.split('.')[1];
            var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            var jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
            return JSON.parse(jsonPayload);
        } catch (e) {
            console.error("Error parsing JWT:", e);
            return null;
        }
    }


    // Initialize UC widget inline on page load
    async function initUcWidget() {
        try {
            var accept = await Accept(jwt);
            var up = await accept.unifiedPayments(true);

            var tt = await up.show({
                containers: { paymentSelection: "#ucWidgetContainer" }
            });

            var completeResponse = await up.complete(tt);
            var parsed = parseJwt(completeResponse);
            if (parsed) {
                document.getElementById('ucWidgetContainer').style.display = 'none';
                clearCart();
                showUcConfirmation(parsed);
            }
        } catch (error) {
            console.error("UC payment error:", error);
        }
    }

    function showUcConfirmation(paymentDetails) {
        var transactionId = (paymentDetails.details &&
            paymentDetails.details.processorInformation &&
            paymentDetails.details.processorInformation.transactionId) ||
            paymentDetails.id || '';
        var ref = transactionId.slice(-8).toUpperCase();

        var amount = '';
        var currency = 'ZAR';
        if (paymentDetails.details &&
            paymentDetails.details.orderInformation &&
            paymentDetails.details.orderInformation.amountDetails) {
            var ad = paymentDetails.details.orderInformation.amountDetails;
            amount = ad.totalAmount || ad.authorizedAmount || '';
            currency = ad.currency || 'ZAR';
        }
        var displayAmount = amount ? (currency === 'ZAR' ? 'R' : currency + ' ') + parseFloat(amount).toFixed(2) : fmt(getTotal());

        var cardNumber = '';
        var cardType = '';
        if (paymentDetails.details &&
            paymentDetails.details.paymentInformation &&
            paymentDetails.details.paymentInformation.tokenizedCard) {
            var tc = paymentDetails.details.paymentInformation.tokenizedCard;
            cardNumber = tc.suffix || '';
            cardType = tc.type || '';
        } else if (paymentDetails.details &&
            paymentDetails.details.paymentInformation &&
            paymentDetails.details.paymentInformation.card) {
            var c = paymentDetails.details.paymentInformation.card;
            cardNumber = c.suffix || '';
            cardType = c.type || '';
        }

        var b = { name: 'Card', icon: 'bi-credit-card', color: '#1a1f71' };
        if (cardType === '001' || cardType.toLowerCase() === 'visa') b = { name: 'Visa', icon: 'bi-credit-card', color: '#1a1f71' };
        else if (cardType === '002' || cardType.toLowerCase() === 'mastercard') b = { name: 'Mastercard', icon: 'bi-credit-card-2-front', color: '#eb001b' };
        else if (cardType === '003' || cardType.toLowerCase() === 'amex') b = { name: 'Amex', icon: 'bi-credit-card-2-back', color: '#006fcf' };

        var now = new Date();
        var dateStr = now.toLocaleDateString('en-ZA', { year: 'numeric', month: 'long', day: 'numeric' });
        var timeStr = now.toLocaleTimeString('en-ZA', { hour: '2-digit', minute: '2-digit' });

        var el = document.getElementById('ucConfirmation');
        el.style.display = 'block';
        el.innerHTML =
            '<div class="text-center py-3">'
            + '<div style="width:64px;height:64px;border-radius:50%;background:#d4edda;display:inline-flex;align-items:center;justify-content:center;margin-bottom:16px;">'
            + '<i class="bi bi-check-lg" style="font-size:2rem;color:#198754;"></i></div>'
            + '<h5 class="fw-bold mb-1">Payment Successful</h5>'
            + '<p class="text-muted mb-0" style="font-size:.9rem;">Thank you for your purchase!</p>'
            + '</div>'
            + '<div class="d-flex justify-content-between mb-2 mt-3"><span class="text-muted">Amount Paid</span><span class="fw-bold fs-5" style="color:var(--cs-primary);">' + displayAmount + '</span></div>'
            + '<div class="d-flex justify-content-between mb-2"><span class="text-muted">Reference</span><span class="fw-semibold" style="font-family:monospace;">#' + esc(ref) + '</span></div>'
            + '<div class="d-flex justify-content-between mb-2"><span class="text-muted">Date</span><span class="fw-semibold">' + esc(dateStr) + '</span></div>'
            + '<div class="d-flex justify-content-between mb-2"><span class="text-muted">Time</span><span class="fw-semibold">' + esc(timeStr) + '</span></div>'
            + (cardNumber ? '<hr><div class="d-flex align-items-center gap-3">'
                + '<div style="font-size:1.4rem;color:' + b.color + ';"><i class="bi ' + b.icon + '"></i></div>'
                + '<div><div class="fw-semibold" style="font-size:.9rem;color:' + b.color + ';">' + esc(b.name) + ' ending in ' + esc(cardNumber) + '</div></div></div>' : '')
            + '<button class="btn btn-outline-primary w-100 mt-3" onclick="window.location.href=\'/\'">'
            + '<i class="bi bi-bag me-2"></i>Continue Shopping</button>';
    }

    initUcWidget();


    // Open sidebar with custom payment form
    function openCustomSidebar(method) {
        ucInitialized = false;
        ucSidebarPending = false;

        var titles = {
            cardOnly: 'Click to Pay',
            token: 'Saved Card',
            invoice: 'Pay by Invoice',
            paymentLink: 'Payment Link',
            samsungPay: 'Samsung Pay',
            tokenizedCheckout: 'Tokenized Card'
        };
        var renderers = {
            cardOnly: renderCardOnlyForm,
            token: renderTokenForm,
            invoice: renderInvoiceForm,
            paymentLink: renderPaymentLinkForm,
            samsungPay: renderSamsungPayForm,
            tokenizedCheckout: renderTokenizedCheckoutForm
        };

        document.getElementById('paymentSidebarLabel').textContent = titles[method];
        document.getElementById('sidebarContent').innerHTML = renderers[method]();

        if (method === 'cardOnly') initCardOnlyWidget();
        if (method === 'token') initSavedCardView();
        if (method === 'tokenizedCheckout') initFlexMicroform();

        var sidebar = bootstrap.Offcanvas.getOrCreateInstance(
            document.getElementById('paymentSidebar'));
        sidebar.show();
    }
</script>
</body>
</html>
