<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Your Cart — CyberShop')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container my-4">
    <!-- Empty cart -->
    <div id="emptyCart" class="text-center py-5" style="display:none;">
        <i class="bi bi-bag-x" style="font-size: 4rem; color: #adb5bd;"></i>
        <h4 class="mt-3 text-muted">Your cart is empty</h4>
        <a href="/" class="btn btn-accent mt-3">Browse Products</a>
    </div>

    <!-- Cart with items -->
    <div id="filledCart" style="display:none;">
        <div class="row g-4">
            <!-- Left: Delivery Options -->
            <div class="col-lg-7">
                <h2 class="fw-bold mb-4" style="color: var(--cs-primary);">Delivery Options</h2>

                <div class="d-flex gap-3 mb-4">
                    <button class="btn delivery-opt active" id="btnShip">
                        <i class="bi bi-truck me-2"></i>Ship It To Me
                    </button>
                    <button class="btn delivery-opt" id="btnPickup" disabled>
                        <i class="bi bi-geo-alt me-2"></i>Pick Up
                    </button>
                </div>

                <div class="bg-white border rounded-3 p-3 mb-3 d-flex gap-3">
                    <input class="form-check-input mt-1 flex-shrink-0" type="checkbox" id="loyaltyCheck">
                    <label for="loyaltyCheck">
                        <strong>Join CyberShop Rewards</strong><br>
                        <small class="text-muted">Earn points on purchases and get member-only discounts.</small>
                    </label>
                </div>

                <div class="bg-white border rounded-3 p-3 mb-3 d-flex gap-3">
                    <input class="form-check-input mt-1 flex-shrink-0" type="checkbox" id="warrantyCheck">
                    <label for="warrantyCheck">
                        <strong>Extended Warranty</strong><br>
                        <small class="text-muted">Covers manufacturing defects and accidental damage for 2 years.</small>
                    </label>
                </div>
            </div>

            <!-- Right: Order Summary + Payment Methods -->
            <div class="col-lg-5">
                <div class="bg-white rounded-3 border p-4">
                    <!-- Items -->
                    <div id="cartItemsList"></div>

                    <hr>

                    <!-- Totals -->
                    <div class="d-flex justify-content-between mb-2">
                        <span>Subtotal</span>
                        <span id="cartSubtotal" class="fw-semibold">R0.00</span>
                    </div>
                    <div class="d-flex justify-content-between mb-2">
                        <span>VAT (15%)</span>
                        <span id="cartTax">R0.00</span>
                    </div>
                    <div class="d-flex justify-content-between mb-3">
                        <span>Shipping</span>
                        <span class="text-success">Free</span>
                    </div>
                    <hr>
                    <div class="d-flex justify-content-between fw-bold fs-5 mb-4">
                        <span>Total</span>
                        <span id="cartTotal" style="color: var(--cs-primary);">R0.00</span>
                    </div>

                    <!-- Payment Method Buttons -->
                    <div class="d-grid gap-2">
                        <button class="btn pay-method-btn" onclick="goToCheckout('card')">
                            <i class="bi bi-credit-card-2-front me-2"></i>Card Payment
                        </button>
                        <button class="btn pay-method-btn" onclick="goToCheckout('wallet')">
                            <i class="bi bi-wallet2 me-2"></i>Digital Wallet
                        </button>
                        <button class="btn pay-method-btn" onclick="goToCheckout('eft')">
                            <i class="bi bi-bank me-2"></i>Bank Transfer (EFT)
                        </button>
                        <button class="btn pay-method-btn" onclick="goToCheckout('token')">
                            <i class="bi bi-shield-check me-2"></i>Saved Card
                        </button>
                        <button class="btn pay-method-btn" onclick="goToCheckout('invoice')">
                            <i class="bi bi-receipt me-2"></i>Pay by Invoice
                        </button>
                        <button class="btn pay-method-btn" onclick="goToCheckout('paymentLink')">
                            <i class="bi bi-link-45deg me-2"></i>Payment Link
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/store.js"></script>
<script>renderCartPage();</script>
</body>
</html>
