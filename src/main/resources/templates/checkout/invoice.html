<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Invoices')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container" style="max-width: 700px;">
    <h2 class="mb-2">Invoice Management</h2>
    <p class="text-muted mb-4">Create a draft invoice, then send it &mdash; CyberSource emails the customer a hosted payment link</p>

    <!-- ── Step 1: Create Invoice ── -->
    <div class="card mb-2">
        <div class="card-header d-flex justify-content-between align-items-center">
            <span><strong>Create Invoice</strong> &mdash; Draft</span>
            <span class="badge bg-primary step-badge">Step 1</span>
        </div>
        <div class="card-body">
            <form id="createForm">
                <div class="mb-3">
                    <label class="form-label">Customer Email</label>
                    <input type="email" name="customerEmail" class="form-control" value="customer@example.com" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Description</label>
                    <input type="text" name="description" class="form-control" value="Demo invoice item" required>
                </div>
                <div class="row mb-3">
                    <div class="col">
                        <label class="form-label">Amount</label>
                        <input type="number" name="amount" class="form-control" value="100.00" step="0.01" required>
                    </div>
                    <div class="col">
                        <label class="form-label">Currency</label>
                        <input type="text" name="currency" class="form-control" value="ZAR" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Due Date</label>
                    <input type="date" name="dueDate" class="form-control" value="2026-04-01">
                </div>
                <button type="submit" class="btn btn-primary w-100">Create Invoice</button>
            </form>
            <div id="createResult" class="result-box mt-3"></div>
        </div>
    </div>

    <div class="flow-arrow">&darr;</div>

    <!-- ── Step 2: Send Invoice ── -->
    <div class="card mb-2">
        <div class="card-header d-flex justify-content-between align-items-center">
            <span><strong>Send Invoice</strong> &mdash; Email to Customer</span>
            <span class="badge bg-success step-badge">Step 2</span>
        </div>
        <div class="card-body">
            <form id="sendForm">
                <div class="mb-3">
                    <label class="form-label">Invoice ID</label>
                    <input type="text" id="sendInvoiceId" name="invoiceId" class="form-control"
                           placeholder="Auto-filled from Create Invoice above" required>
                    <div class="form-text">This is auto-filled when you create an invoice above.</div>
                </div>
                <button type="submit" class="btn btn-success w-100">Send Invoice</button>
            </form>
            <div id="sendResult" class="result-box mt-3"></div>
        </div>
    </div>

    <hr class="my-4">

    <!-- ── Get Invoice (optional) ── -->
    <div class="card mb-3">
        <div class="card-header d-flex justify-content-between align-items-center">
            <span><strong>Get Invoice</strong> &mdash; Retrieve Details</span>
            <span class="badge bg-secondary step-badge">Optional</span>
        </div>
        <div class="card-body">
            <form id="getForm">
                <div class="mb-3">
                    <label class="form-label">Invoice ID</label>
                    <input type="text" id="getInvoiceId" name="invoiceId" class="form-control"
                           placeholder="Auto-filled from Create Invoice above" required>
                </div>
                <button type="submit" class="btn btn-outline-primary w-100">Get Invoice</button>
            </form>
            <div id="getResult" class="result-box mt-3"></div>
        </div>
    </div>

    <a href="/" class="btn btn-outline-secondary w-100 mb-4">&larr; Back to Home</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/demo.js"></script>
<script>
document.getElementById('createForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    var btn = this.querySelector('button[type="submit"]');
    setLoading(btn, true);
    var f = this;
    var result = await callApi('/api/invoices', 'POST', {
        customerEmail: f.customerEmail.value,
        description: f.description.value,
        amount: parseFloat(f.amount.value),
        currency: f.currency.value,
        dueDate: f.dueDate.value || null
    });
    setLoading(btn, false);
    showResult('createResult', result);
    if (result.ok && result.data.transactionId) {
        document.getElementById('sendInvoiceId').value = result.data.transactionId;
        document.getElementById('getInvoiceId').value = result.data.transactionId;
    }
});

document.getElementById('sendForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    var btn = this.querySelector('button[type="submit"]');
    setLoading(btn, true);
    var invoiceId = this.invoiceId.value;
    var result = await callApi('/api/invoices/' + invoiceId + '/send', 'POST', {});
    setLoading(btn, false);
    showResult('sendResult', result);
});

document.getElementById('getForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    var btn = this.querySelector('button[type="submit"]');
    setLoading(btn, true);
    var invoiceId = this.invoiceId.value;
    var result = await callApi('/api/invoices/' + invoiceId, 'GET', null);
    setLoading(btn, false);
    showResult('getResult', result);
});
</script>
</body>
</html>
