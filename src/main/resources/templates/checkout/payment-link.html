<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Payment Links')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container" style="max-width: 600px;">
    <h2 class="mb-2">Create Payment Link</h2>
    <p class="text-muted mb-4">Generate a shareable CyberSource-hosted payment URL &mdash; send via email, SMS, or any channel</p>

    <div class="card mb-3">
        <div class="card-body">
            <form id="linkForm">
                <div class="mb-3">
                    <label class="form-label">Description</label>
                    <input type="text" name="description" class="form-control" value="Demo payment link" required>
                </div>
                <div class="row mb-3">
                    <div class="col">
                        <label class="form-label">Amount</label>
                        <input type="number" name="amount" class="form-control" value="50.00" step="0.01" required>
                    </div>
                    <div class="col">
                        <label class="form-label">Currency</label>
                        <input type="text" name="currency" class="form-control" value="USD" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100">Create Payment Link</button>
            </form>
            <div id="linkResult" class="result-box mt-3"></div>
        </div>
    </div>

    <a href="/" class="btn btn-outline-secondary w-100 mb-4">&larr; Back to Home</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/demo.js"></script>
<script>
document.getElementById('linkForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    var btn = this.querySelector('button[type="submit"]');
    setLoading(btn, true);
    var f = this;
    var result = await callApi('/api/payment-links', 'POST', {
        description: f.description.value,
        amount: parseFloat(f.amount.value),
        currency: f.currency.value
    });
    setLoading(btn, false);
    showResult('linkResult', result);
});
</script>
</body>
</html>
