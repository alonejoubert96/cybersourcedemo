<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('EFT Payment')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container" style="max-width: 600px;">
    <h2 class="mb-2">EFT / eCheck Payment</h2>
    <p class="text-muted mb-4">ACH bank account debit using routing number and account number</p>

    <div class="card mb-3">
        <div class="card-body">
            <form id="eftForm">
                <div class="mb-3">
                    <label class="form-label">Routing Number (ABA)</label>
                    <input type="text" name="routingNumber" class="form-control" value="121042882" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Account Number</label>
                    <input type="text" name="accountNumber" class="form-control" value="4100" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Account Type</label>
                    <select name="accountType" class="form-select" required>
                        <option value="C" selected>Checking</option>
                        <option value="S">Savings</option>
                    </select>
                </div>

                <div class="row mb-3">
                    <div class="col">
                        <label class="form-label">First Name</label>
                        <input type="text" name="firstName" class="form-control" value="Viktor">
                    </div>
                    <div class="col">
                        <label class="form-label">Last Name</label>
                        <input type="text" name="lastName" class="form-control" value="Vaughn">
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control" value="customer@example.com">
                </div>

                <div class="row mb-3">
                    <div class="col">
                        <label class="form-label">Amount</label>
                        <input type="number" name="amount" class="form-control" value="102.21" step="0.01" required>
                    </div>
                    <div class="col">
                        <label class="form-label">Currency</label>
                        <input type="text" name="currency" class="form-control" value="USD" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-100">Pay with eCheck</button>
            </form>
            <div id="eftResult" class="result-box mt-3"></div>
        </div>
    </div>

    <a href="/" class="btn btn-outline-secondary w-100 mb-4">&larr; Back to Home</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/demo.js"></script>
<script>
document.getElementById('eftForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    var btn = this.querySelector('button[type="submit"]');
    setLoading(btn, true);
    var f = this;
    var result = await callApi('/api/payments/eft', 'POST', {
        routingNumber: f.routingNumber.value,
        accountNumber: f.accountNumber.value,
        accountType: f.accountType.value,
        firstName: f.firstName.value,
        lastName: f.lastName.value,
        email: f.email.value,
        amount: parseFloat(f.amount.value),
        currency: f.currency.value
    });
    setLoading(btn, false);
    showResult('eftResult', result);
});
</script>
</body>
</html>
